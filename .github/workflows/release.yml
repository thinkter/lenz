name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-tauri:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            runner: ubuntu-22.04
            args: ""
          - name: Windows
            runner: windows-latest
            args: ""
          - name: macOS Apple Silicon
            runner: macos-latest
            args: "--target aarch64-apple-darwin"
          - name: macOS Intel
            runner: macos-latest
            args: "--target x86_64-apple-darwin"

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS Rust targets
        if: startsWith(matrix.runner, 'macos')
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            wget

      - name: Install frontend deps
        run: bun install --frozen-lockfile

      - name: Build + Publish Release Artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event_name == 'push' && github.ref_name || 'v__VERSION__' }}
          releaseName: "Lenz ${{ github.event_name == 'push' && github.ref_name || 'v__VERSION__' }}"
          releaseBody: |
            Download the installer or bundle for your platform from the assets below.
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          tauriScript: bun tauri
          releaseAssetNamePattern: "[name]_[version]_[platform]_[arch][setup][ext]"
          uploadWorkflowArtifacts: true
          args: ${{ matrix.args }}

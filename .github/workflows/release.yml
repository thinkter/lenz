name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-tauri:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            runner: ubuntu-22.04
            args: ""
            npm_asset_suffix: linux-x64
            target_triple: ""
          - name: Windows
            runner: windows-latest
            args: ""
            npm_asset_suffix: windows-x64
            target_triple: ""
          - name: macOS Apple Silicon
            runner: macos-latest
            args: "--target aarch64-apple-darwin"
            npm_asset_suffix: macos-arm64
            target_triple: aarch64-apple-darwin
          - name: macOS Intel
            runner: macos-latest
            args: "--target x86_64-apple-darwin"
            npm_asset_suffix: macos-x64
            target_triple: x86_64-apple-darwin

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS Rust targets
        if: startsWith(matrix.runner, 'macos')
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            wget

      - name: Sync app version from release tag
        if: github.event_name == 'push'
        shell: bash
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          node ./scripts/sync-version.mjs "${RELEASE_VERSION#v}"

      - name: Install frontend deps
        run: bun install --frozen-lockfile

      - name: Build + Publish Release Artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event_name == 'push' && github.ref_name || 'v__VERSION__' }}
          releaseName: "Lenz ${{ github.event_name == 'push' && github.ref_name || 'v__VERSION__' }}"
          releaseBody: |
            Download the installer or bundle for your platform from the assets below.
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          tauriScript: bun tauri
          releaseAssetNamePattern: "[name]_[version]_[platform]_[arch][setup][ext]"
          uploadWorkflowArtifacts: true
          args: ${{ matrix.args }}

      - name: Package npm runtime asset
        if: github.event_name == 'push'
        shell: bash
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
          NPM_ASSET_SUFFIX: ${{ matrix.npm_asset_suffix }}
          TARGET_TRIPLE: ${{ matrix.target_triple }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_VERSION#v}"
          OUT_DIR="${RUNNER_TEMP}/npm-assets"
          mkdir -p "${OUT_DIR}"

          case "${NPM_ASSET_SUFFIX}" in
            linux-x64)
              SOURCE_PATH="$(find src-tauri/target -type f -path '*bundle/appimage/*.AppImage' | head -n 1)"
              cp "${SOURCE_PATH}" "${OUT_DIR}/lenz-v${VERSION}-${NPM_ASSET_SUFFIX}.AppImage"
              chmod +x "${OUT_DIR}/lenz-v${VERSION}-${NPM_ASSET_SUFFIX}.AppImage"
              ;;
            windows-x64)
              cp "src-tauri/target/release/lenz.exe" "${OUT_DIR}/lenz-v${VERSION}-${NPM_ASSET_SUFFIX}.exe"
              ;;
            macos-*)
              APP_PATH="src-tauri/target/${TARGET_TRIPLE}/release/bundle/macos/lenz.app"
              tar -czf "${OUT_DIR}/lenz-v${VERSION}-${NPM_ASSET_SUFFIX}.app.tar.gz" -C "$(dirname "${APP_PATH}")" "$(basename "${APP_PATH}")"
              ;;
            *)
              echo "Unknown npm asset suffix: ${NPM_ASSET_SUFFIX}" >&2
              exit 1
              ;;
          esac

      - name: Upload npm runtime asset
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ runner.temp }}/npm-assets/*

  publish-npm:
    if: github.event_name == 'push' && secrets.NPM_TOKEN != ''
    needs: publish-tauri
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Sync package version from release tag
        shell: bash
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          node ./scripts/sync-version.mjs "${RELEASE_VERSION#v}"

      - name: Publish npm package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
